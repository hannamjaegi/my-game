
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>두더지 게임</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 시작 화면 -->
<div id="startScreen">
  <h2>게임 시작</h2>
  <input id="difficultyInput" placeholder="난이도 입력 (easy/normal/hard)">
  <button onclick="startGameButton()">시작</button>
</div>

<!-- UI -->
<div id="ui">
  <div id="score">점수: 0</div>
  <div id="timer">시간: 60</div>
</div>

<div id="buff">🔥 2배!</div>

<!-- 게임 -->
<div id="game"></div>
<div id="blind"></div>

<!-- 수학 문제 -->
<div id="mathScreen">
  <h2 id="mathQuestion"></h2>
  <input type="number" id="mathAnswer">
  <button onclick="submitAnswer()">확인</button>
</div>

<link rel="stylesheet" href="style.css?v=2">
<script src="script.js?v=2"></script>

</body>
</html>
