<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>집중력 두더지 게임</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎮 시작 화면 -->
<div id="startScreen" class="screen">
  <h1>🎯 집중력 두더지 게임</h1>

  <input id="difficultyInput" placeholder="easy / normal / hard">
  
  <button onclick="googleLogin()">🔐 구글 로그인</button>
  <button onclick="startGameButton()">🚀 시작</button>

  <div id="userInfo"></div>
</div>


<!-- ⏱ 카운트다운 -->
<div id="countdown" class="screen hidden">
  <h1 id="countText">3</h1>
</div>


<!-- 🧮 수학 화면 -->
<div id="mathScreen" class="screen hidden">
  <h2 id="mathQuestion"></h2>
  <input id="mathAnswer" placeholder="정답 입력">
  <button onclick="submitAnswer()">확인</button>
</div>


<!-- 🎯 게임 UI -->
<div id="gameUI" class="hidden">
  <div id="topBar">
    <div id="score">점수: 0</div>
    <div id="timer">시간: 90</div>
    <div id="doubleBuff">🔥 2배 활성!</div>
  </div>

  <div id="game"></div>
</div>


<!-- 🏆 랭킹 -->
<div id="leaderboard" class="screen hidden"></div>


<!-- 📊 결과 -->
<div id="resultScreen" class="screen hidden"></div>


<!-- 🔊 사운드 자동 활성 트리거 -->
<div id="soundUnlock"></div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup }
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import { getFirestore }
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "molegame-edda5.firebaseapp.com",
  projectId: "molegame-edda5",
  appId: "1:338866969088:web:b3fbc88a499b4fab5296e5"
};

const app = initializeApp(firebaseConfig);

window.fb = {
  auth: getAuth(app),
  provider: new GoogleAuthProvider(),
  db: getFirestore(app),
  signInWithPopup
};
</script>

<script src="script.js"></script>

</body>
</html>
